<svg width="480" height="120" viewBox="0 0 480 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgH" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3A8A6B"/>
      <stop offset="100%" stop-color="#1E4F3A"/>
    </linearGradient>
    <linearGradient id="heartH" x1="60" y1="24" x2="60" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0F4EC"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0D2B1E" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Icon pill -->
  <rect width="120" height="120" rx="26" fill="url(#bgH)"/>
  <rect width="120" height="60" rx="26" fill="white" fill-opacity="0.04"/>

  <!-- Heart -->
  <path
    d="M60 91
       C 58 90, 22 70, 20 46
       C 18 30, 30 20, 43 21
       C 51 22, 58 27, 60 32
       C 62 27, 69 22, 77 21
       C 90 20, 102 30, 100 46
       C 98 70, 62 90, 60 91 Z"
    fill="url(#heartH)"
    filter="url(#sh)"
  />

  <!-- Wordmark: Rally -->
  <text
    x="142" y="76"
    font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="-1.5"
    fill="#1E3228"
  >Rally</text>
</svg>
